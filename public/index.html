
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LinkMan</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600;700&family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #1e1e1e;
      --bg-layer: #181818;
      --surface: #252526;
      --surface-2: #2d2d30;
      --surface-3: #353537;
      --text: #d4d4d4;
      --muted: #a8a8a8;
      --accent: orangered;
      --accent-2: #ff6d4a;
      --danger: #ff8470;
      --border: #3c3c3c;
      --group-col-min: 220px;
      --group-col-max: 300px;
      --shadow: 0 16px 32px rgba(0, 0, 0, 0.45);
      --focus-ring: 0 0 0 2px rgba(255, 69, 0, 0.3);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      height: 100vh;
      font-family: "Space Grotesk", "Segoe UI", sans-serif;
      font-size: 15px;
      color: var(--text);
      overflow: auto;
      background: linear-gradient(180deg, var(--bg) 0%, var(--bg-layer) 100%);
    }

    .wrap {
      width: 100%;
      max-width: none;
      margin: 0;
      padding: 8px 12px 96px;
      transform-origin: top left;
      position: relative;
      z-index: 1;
    }

    .header {
      display: grid;
      grid-template-columns: 1fr minmax(180px, 1.2fr) 1fr;
      align-items: center;
      gap: 10px;
      margin: 0;
      position: fixed;
      left: 12px;
      right: 12px;
      bottom: 10px;
      z-index: 40;
      padding: 6px 8px;
      border: 1px solid var(--border);
      border-radius: 12px;
      background: linear-gradient(180deg, rgba(37, 37, 38, 0.95) 0%, rgba(24, 24, 24, 0.95) 100%);
      box-shadow: var(--shadow);
    }

    .icon-btn {
      border: 1px solid #5c4038;
      border-radius: 10px;
      width: 38px;
      height: 38px;
      padding: 0;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(90deg, #3a2e2a 0%, #302522 100%);
      color: #ffd6cc;
      cursor: pointer;
      transition: transform 0.12s ease, box-shadow 0.2s ease, border-color 0.2s ease;
    }

    .icon-btn svg {
      width: 18px;
      height: 18px;
      pointer-events: none;
    }

    .icon-btn:hover {
      transform: translateY(-1px);
      border-color: #7c4c40;
      box-shadow: 0 0 14px rgba(255, 69, 0, 0.2);
    }

    .icon-btn:focus-visible {
      outline: none;
      box-shadow: var(--focus-ring);
    }

    .icon-btn-main {
      background: linear-gradient(90deg, var(--accent-2) 0%, var(--accent) 100%);
      border-color: rgba(255, 150, 121, 0.6);
      color: #fff4f1;
      box-shadow: 0 0 16px rgba(255, 69, 0, 0.26);
    }

    .brand {
      margin-left: 0;
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 7px 10px;
      border: 1px solid var(--border);
      border-radius: 10px;
      background: linear-gradient(135deg, #252526 0%, #202021 100%);
      box-shadow: var(--shadow);
      justify-self: start;
    }

    #addGroupBtn {
      justify-self: auto;
    }

    .header-actions {
      justify-self: end;
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }

    .brand-logo {
      width: 28px;
      height: 28px;
      flex: 0 0 auto;
      filter: drop-shadow(0 0 8px rgba(255, 69, 0, 0.25));
    }

    .brand-title {
      margin: 0;
      font-family: "Orbitron", "Space Grotesk", sans-serif;
      font-size: clamp(1.25rem, 2.5vw, 1.85rem);
      line-height: 1;
      letter-spacing: 0.07em;
      text-transform: uppercase;
    }

    .brand-credit {
      font-size: 0.66rem;
      letter-spacing: 0.03em;
      color: #c9a49a;
      white-space: nowrap;
      opacity: 0.9;
    }

    .brand-link {
      color: #ffab98;
      text-shadow: 0 0 8px rgba(255, 109, 74, 0.28);
    }

    .brand-man {
      color: var(--accent);
      text-shadow: 0 0 10px rgba(255, 69, 0, 0.35);
    }

    .status-text {
      margin: 0;
      min-height: 1.2em;
      text-align: center;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .functions-panel {
      display: grid;
      gap: 8px;
      margin-top: 4px;
    }

    .functions-file-name {
      margin: 6px 0 0;
      min-height: 1.2em;
      font-size: 0.82rem;
      letter-spacing: 0.02em;
      word-break: break-word;
    }

    .card {
      background: linear-gradient(165deg, #252526 0%, #202022 100%);
      border: 1px solid var(--border);
      border-radius: 12px;
      box-shadow: var(--shadow);
      padding: 14px;
      animation: reveal 220ms ease-out;
    }

    .board {
      display: grid;
      width: 100%;
      grid-template-columns: repeat(auto-fill, minmax(var(--group-col-min), var(--group-col-max)));
      grid-auto-flow: dense;
      grid-auto-rows: 8px;
      gap: 10px;
      align-items: start;
      justify-content: start;
    }

    .board.group-drop-end {
      border-radius: 10px;
      box-shadow: inset 0 0 0 1px rgba(255, 109, 74, 0.34);
      background: rgba(255, 69, 0, 0.06);
    }

    label {
      display: block;
      margin-bottom: 6px;
      color: var(--muted);
      font-size: 0.85rem;
      font-weight: 600;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    input, textarea, select, button {
      font: inherit;
      color: var(--text);
      font-size: 0.92rem;
    }

    input, textarea, select {
      width: 100%;
      padding: 8px 10px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: linear-gradient(180deg, #2a2a2c 0%, #232325 100%);
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s, background 0.2s;
    }

    textarea {
      min-height: 110px;
      resize: vertical;
    }

    input:focus, textarea:focus, select:focus {
      border-color: var(--accent);
      box-shadow: var(--focus-ring);
      background: linear-gradient(180deg, #2e2e31 0%, #252527 100%);
    }

    .row { margin-bottom: 10px; }

    .btn-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 8px;
    }

    button {
      border: 1px solid transparent;
      border-radius: 8px;
      padding: 7px 12px;
      cursor: pointer;
      font-weight: 700;
      letter-spacing: 0.01em;
      transition: transform 0.12s ease, box-shadow 0.2s ease, background 0.2s ease;
    }

    button:hover {
      transform: translateY(-1px);
    }

    button:active { transform: translateY(1px); }

    button:disabled {
      cursor: not-allowed;
      opacity: 0.62;
      filter: saturate(0.7);
    }

    .btn-main {
      background: linear-gradient(90deg, var(--accent-2) 0%, var(--accent) 100%);
      color: #fff4f1;
      box-shadow: 0 0 16px rgba(255, 69, 0, 0.26);
    }

    .btn-secondary {
      background: linear-gradient(90deg, #3a2e2a 0%, #302522 100%);
      color: #ffc4b6;
      border-color: #5c4038;
    }

    .btn-danger {
      background: #3a2523;
      color: #ffb8aa;
      border-color: #6b4843;
    }

    .category-add {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 8px;
      margin-top: 6px;
    }

    .chips {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-top: 8px;
    }

    .chip {
      border-radius: 999px;
      background: linear-gradient(180deg, #302724 0%, #2a211f 100%);
      border: 1px solid #5a3b33;
      color: #c9978c;
      padding: 4px 9px;
      font-size: 0.78rem;
      letter-spacing: 0.02em;
    }

   .group-card {
      background: linear-gradient(180deg, #111111 0%, #161616 100%);
      border: 1px solid var(--border);
      border-radius: 8px;
      box-shadow: var(--shadow);
      padding: 8px;
      min-height: 170px;
      animation: reveal 240ms ease-out;
      cursor: grab;
    }

    .group-card.dragging {
      opacity: 0.45;
      cursor: grabbing;
      border-color: var(--accent);
      box-shadow: 0 0 18px rgba(255, 69, 0, 0.24);
    }

    .widget-card {
      background: linear-gradient(180deg, #131313 0%, #171717 100%);
      border: 1px solid #3b3b3d;
      border-radius: 8px;
      box-shadow: var(--shadow);
      padding: 8px;
      min-height: 170px;
      animation: reveal 240ms ease-out;
    }

    .widget-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      margin-bottom: 8px;
    }

    .widget-title {
      margin: 0;
      font-size: 0.9rem;
      font-family: "Orbitron", "Space Grotesk", sans-serif;
      letter-spacing: 0.07em;
      text-transform: uppercase;
      color: #d2a99e;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .widget-body {
      display: grid;
      justify-items: center;
      gap: 8px;
    }

    .analog-clock {
      position: relative;
      width: 126px;
      height: 126px;
      border-radius: 50%;
      border: 1px solid #5f4f4b;
      background:
        radial-gradient(circle at center, #171717 0%, #131313 68%, #101010 100%),
        repeating-conic-gradient(from -90deg, rgba(255, 170, 145, 0.28) 0deg 1deg, transparent 1deg 30deg);
      box-shadow: inset 0 0 14px rgba(0, 0, 0, 0.46), 0 6px 16px rgba(0, 0, 0, 0.35);
      overflow: hidden;
    }

    .analog-clock::before {
      content: '';
      position: absolute;
      inset: 10px;
      border-radius: 50%;
      border: 1px solid rgba(255, 137, 98, 0.2);
      pointer-events: none;
    }

    .clock-hand {
      position: absolute;
      left: 50%;
      top: 50%;
      transform-origin: 50% 100%;
      border-radius: 999px;
      pointer-events: none;
    }

    .clock-hour {
      width: 4px;
      height: 31px;
      margin-left: -2px;
      margin-top: -31px;
      background: #ffd4ca;
    }

    .clock-minute {
      width: 3px;
      height: 44px;
      margin-left: -1.5px;
      margin-top: -44px;
      background: #f0c0b3;
    }

    .clock-second {
      width: 2px;
      height: 50px;
      margin-left: -1px;
      margin-top: -50px;
      background: #ff6d4a;
      box-shadow: 0 0 8px rgba(255, 109, 74, 0.45);
    }

    .clock-second.hidden {
      display: none;
    }

    .clock-center-dot {
      position: absolute;
      left: 50%;
      top: 50%;
      width: 8px;
      height: 8px;
      margin-left: -4px;
      margin-top: -4px;
      border-radius: 50%;
      background: #ffd2c8;
      border: 1px solid #8a5f56;
      box-shadow: 0 0 8px rgba(255, 109, 74, 0.35);
    }

    .widget-meta {
      margin: 0;
      text-align: center;
      font-size: 0.79rem;
      color: #c9a49a;
      word-break: break-word;
    }

    .group-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      margin-bottom: 8px;
    }

    .group-actions {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      flex: 0 0 auto;
    }

    .group-action-btn {
      width: 28px;
      height: 28px;
      border-radius: 8px;
      border-color: #4f413e;
      background: linear-gradient(180deg, #2f2a28 0%, #272321 100%);
      color: #d6b0a7;
      padding: 0;
    }

    .group-action-btn:hover {
      border-color: #786059;
      box-shadow: 0 0 12px rgba(255, 109, 74, 0.16);
    }

    .group-action-btn.group-delete-btn {
      color: #f2b1a0;
      border-color: #65413a;
      background: linear-gradient(180deg, #372624 0%, #2f2120 100%);
    }

    .group-title {
      margin: 0;
      font-size: 0.95rem;
      font-family: "Orbitron", "Space Grotesk", sans-serif;
      letter-spacing: 0.08em;
      color: #ba8e84;
      text-transform: uppercase;
      cursor: text;
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .links {
      display: grid;
      gap: 4px;
    }

    .link-item {
    background: linear-gradient(180deg, #111111 0%, #111111 100%);
    border: 1px solid #333333;
    border-radius: 4px;
    min-height: 28px;
    padding: 2px 4px;
    display: flex;
    align-items: center;
    gap: 5px;
    transition: border-color 0.2s, box-shadow 0.2s, transform 0.15s, opacity 0.15s;
    cursor: grab;
}

    .link-item:hover {
      border-color: #656568;
      box-shadow: 0 8px 14px rgba(0, 0, 0, 0.3);
      transform: translateY(-1px);
    }

    .link-item.dragging {
      opacity: 0.45;
      border-color: var(--accent);
      box-shadow: 0 0 14px rgba(255, 69, 0, 0.22);
      cursor: grabbing;
    }

    .link-item.drop-before {
      border-top-color: var(--accent);
      box-shadow: inset 0 2px 0 var(--accent), 0 0 12px rgba(255, 69, 0, 0.18);
    }

    .group-card.drag-over {
      border-color: var(--accent-2);
      box-shadow: 0 0 16px rgba(255, 69, 0, 0.16);
    }

    .group-card.group-drop-left {
      box-shadow: inset 3px 0 0 var(--accent), 0 0 16px rgba(255, 69, 0, 0.16);
    }

    .group-card.group-drop-right {
      box-shadow: inset -3px 0 0 var(--accent), 0 0 16px rgba(255, 69, 0, 0.16);
    }

    .group-card.group-drop-top {
      box-shadow: inset 0 3px 0 var(--accent), 0 0 16px rgba(255, 69, 0, 0.16);
    }

    .group-card.group-drop-bottom {
      box-shadow: inset 0 -3px 0 var(--accent), 0 0 16px rgba(255, 69, 0, 0.16);
    }

    .links.drag-over {
      border-radius: 10px;
      box-shadow: inset 0 0 0 1px rgba(255, 109, 74, 0.34);
      background: rgba(255, 69, 0, 0.07);
    }

    .group-empty {
      border: 1px dashed #6a4f48;
      border-radius: 9px;
      color: #c9a49a;
      text-align: center;
      font-size: 0.78rem;
      padding: 10px 6px;
      background: rgba(43, 33, 30, 0.45);
    }

    .favicon {
      width: 16px;
      height: 16px;
      border-radius: 4px;
      background: #ff000000;
      border: 0px solid #dadada;
    }

    .link-main {
      display: flex;
      align-items: center;
      gap: 4px;
      min-width: 0;
    }

    .link-name {
      margin: 0;
      font-size: 0.9rem;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .link-action {
      color: #f2f3f5;
      text-decoration: none;
      font-size: 13px;
    }

    .link-action:hover {
      color: #ffffff;
      text-decoration: underline;
      text-decoration-thickness: 1px;
    }

    .muted { color: var(--muted); }

    .empty {
      text-align: center;
      color: var(--muted);
      padding: 20px 10px;
      border: 1px dashed #58585a;
      border-radius: 12px;
      background: linear-gradient(180deg, #29292b 0%, #242426 100%);
      font-size: 0.95rem;
    }

    .panel-hidden {
      display: none;
    }

    .modal {
      position: fixed;
      inset: 0;
      z-index: 1200;
    }

    .modal.hidden {
      display: none;
    }

    .modal-backdrop {
      position: absolute;
      inset: 0;
      background: rgba(0, 0, 0, 0.58);
      backdrop-filter: blur(1.5px);
    }

    .modal-dialog {
      position: relative;
      width: min(460px, calc(100vw - 24px));
      margin: 8vh auto 0;
      background: linear-gradient(165deg, #252526 0%, #202022 100%);
      border: 1px solid var(--border);
      border-radius: 12px;
      box-shadow: var(--shadow);
      padding: 14px;
      animation: reveal 190ms ease-out;
    }

    .modal-title {
      margin: 0 0 6px;
      font-size: 1.05rem;
      font-family: "Orbitron", "Space Grotesk", sans-serif;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      color: #e6bbb1;
    }

    .modal-hint {
      margin: 0 0 10px;
      font-size: 0.84rem;
    }

    .editor-preview {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 10px;
      font-size: 0.82rem;
    }

    .editor-preview img {
      width: 18px;
      height: 18px;
      border-radius: 4px;
      border: 1px solid #4a4a4d;
      background: #1d1d1f;
      object-fit: cover;
    }

    .editor-preview img.icon-empty {
      opacity: 0.45;
    }

    .modal-actions {
      display: flex;
      justify-content: flex-end;
      gap: 8px;
      margin-top: 2px;
    }

    .btn {
      border: 1px solid transparent;
      border-radius: 8px;
      padding: 7px 12px;
      cursor: pointer;
      font-weight: 700;
      letter-spacing: 0.01em;
      transition: transform 0.12s ease, box-shadow 0.2s ease, background 0.2s ease;
    }

    .context-menu {
      position: fixed;
      z-index: 1300;
      display: none;
      flex-direction: column;
      min-width: 170px;
      padding: 6px;
      border: 1px solid #4d4d50;
      border-radius: 10px;
      background: linear-gradient(180deg, #242426 0%, #1f1f21 100%);
      box-shadow: var(--shadow);
    }

    .context-menu.open {
      display: flex;
    }

    .context-menu-item {
      border: 1px solid transparent;
      border-radius: 7px;
      background: transparent;
      color: #dfdfe1;
      text-align: left;
      padding: 7px 9px;
      cursor: pointer;
      font-size: 0.9rem;
    }

    .context-menu-item:hover,
    .context-menu-item:focus-visible {
      background: rgba(255, 109, 74, 0.14);
      border-color: rgba(255, 109, 74, 0.34);
      transform: none;
      outline: none;
    }

    .context-menu-item.danger {
      color: #ffb8aa;
    }

    .toggle-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
    }

    .toggle-row label {
      margin: 0;
      text-transform: none;
      letter-spacing: 0.01em;
      font-size: 0.9rem;
      color: #d4d4d4;
      font-weight: 500;
    }

    .toggle-row input[type="checkbox"] {
      width: 18px;
      height: 18px;
      margin: 0;
      accent-color: var(--accent);
      padding: 0;
      border: 0;
      box-shadow: none;
      background: transparent;
    }

    @media (max-width: 1280px) {
      .board {
        --group-col-min: 210px;
        --group-col-max: 280px;
      }
    }

    @media (max-width: 940px) {
      body {
        overflow: auto;
      }

      .wrap {
        transform: none !important;
        width: 100% !important;
        padding: 10px 10px 110px;
      }

      .header {
        left: 10px;
        right: 10px;
        bottom: 10px;
        grid-template-columns: auto minmax(120px, 1fr) auto;
      }

      .board {
        --group-col-min: 190px;
        --group-col-max: 250px;
      }

    }

    @media (max-width: 700px) {
      .modal-dialog { margin-top: 4vh; }
    }

    @keyframes reveal {
      from { opacity: 0; transform: translateY(6px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>
  <div class="wrap" id="wrap">
    <header class="header">
      <div class="brand">
        <svg class="brand-logo" viewBox="0 0 64 64" aria-hidden="true">
          <defs>
            <linearGradient id="lmGlowA" x1="0" y1="0" x2="1" y2="1">
              <stop offset="0%" stop-color="#6fc6ff"/>
              <stop offset="100%" stop-color="#34ddb6"/>
            </linearGradient>
          </defs>
          <rect x="6" y="6" width="52" height="52" rx="14" fill="#0e1929" stroke="url(#lmGlowA)" stroke-width="3"/>
          <path d="M20 34l10-10h7l-10 10 10 10h-7z" fill="#6fc6ff"/>
          <path d="M44 30l-10 10h-7l10-10-10-10h7z" fill="#34ddb6"/>
        </svg>
        <h1 class="brand-title"><span class="brand-link">Link</span><span class="brand-man">Man</span></h1>
        <span class="brand-credit">by Tino Bickel '26</span>
      </div>
      <p class="muted status-text" id="statusText"></p>
      <div class="header-actions">
        <button id="functionsBtn" class="icon-btn" type="button" aria-label="Funktionen" title="Funktionen">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M4 7h16M4 12h16M4 17h16M8 5v4M12 10v4M16 15v4" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
          </svg>
        </button>
        <button id="widgetMenuBtn" class="icon-btn" type="button" aria-label="Widget hinzufügen" title="Widget hinzufügen">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <rect x="4" y="4" width="7" height="7" rx="1.5" fill="none" stroke="currentColor" stroke-width="1.8"/>
            <rect x="13" y="4" width="7" height="7" rx="1.5" fill="none" stroke="currentColor" stroke-width="1.8"/>
            <rect x="4" y="13" width="7" height="7" rx="1.5" fill="none" stroke="currentColor" stroke-width="1.8"/>

    <button id="ctxDeleteLinkBtn" class="context-menu-item danger" type="button" role="menuitem">Löschen</button>

  <script>
    const FILE_SCHEMA_VERSION = 2;
    const DEFAULT_FILE_NAME = 'LinkData.json';
    const LEGACY_STORAGE_KEY = 'linkman_data_v1';
    const CACHE_STORAGE_KEY = 'linkman_cache_v2';
    const AUTO_LOAD_CANDIDATE_FILES = ['LinkData.json', 'linkman-data.json', 'Linkdata1.json'];
    const FILE_PICKER_AVAILABLE = typeof window.showOpenFilePicker === 'function' && typeof window.showSaveFilePicker === 'function';
    const WIDGET_TYPE_ANALOG_CLOCK = 'analog-clock';
    const COMMON_TIME_ZONES = ['Europe/Berlin', 'UTC', 'Europe/London', 'America/New_York', 'America/Los_Angeles', 'Asia/Tokyo', 'Australia/Sydney'];
    const ICON_PLUS = '<svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 5v14M5 12h14" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"/></svg>';
    const ICON_TRASH = '<svg viewBox="0 0 24 24" aria-hidden="true"><path d="M4 7h16M9 7V5h6v2M9 10v7M12 10v7M15 10v7M6.8 7l.8 12h8.8l.8-12" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"/></svg>';
    const ICON_GEAR = '<svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 8.2a3.8 3.8 0 1 1 0 7.6 3.8 3.8 0 0 1 0-7.6zm8.2 3.8-1.8-.6a6.5 6.5 0 0 0-.5-1.2l.9-1.7-1.8-1.8-1.7.9c-.4-.2-.8-.4-1.2-.5l-.6-1.8H10l-.6 1.8c-.4.1-.8.3-1.2.5l-1.7-.9-1.8 1.8.9 1.7c-.2.4-.4.8-.5 1.2l-1.8.6v2.6l1.8.6c.1.4.3.8.5 1.2l-.9 1.7 1.8 1.8 1.7-.9c.4.2.8.4 1.2.5l.6 1.8h2.6l.6-1.8c.4-.1.8-.3 1.2-.5l1.7.9 1.8-1.8-.9-1.7c.2-.4.4-.8.5-1.2l1.8-.6V12z\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.5\" stroke-linecap=\"round\" stroke-linejoin=\"round\"/></svg>';

    const state = {
      categories: [],
      links: [],
      groupOrder: [],
      widgets: []
    };

    const uiState = {
      statusTimer: 0,
      dataFileHandle: null,
      dataFileName: '',
      hasUnsavedChanges: false,
      isSaving: false,
      pendingSave: false,
      editor: {
        open: false,
        mode: 'create',
        groupName: '',
        linkId: '',
        nameTouched: false,
        suggestReqId: 0,
        suggestTimer: 0
      },
      contextMenu: {
        open: false,
        linkId: ''
      },
      widgetMenu: {
        open: false
      },
      widgetEditor: {
        open: false,
        widgetId: ''
      }
    };

    const dom = {
      wrap: document.getElementById('wrap'),
      functionsBtn: document.getElementById('functionsBtn'),
      widgetMenuBtn: document.getElementById('widgetMenuBtn'),
      addGroupBtn: document.getElementById('addGroupBtn'),
      openDataBtn: document.getElementById('openDataBtn'),
      saveDataBtn: document.getElementById('saveDataBtn'),
      saveAsDataBtn: document.getElementById('saveAsDataBtn'),
      exportDataBtn: document.getElementById('exportDataBtn'),
      importFileInput: document.getElementById('importFileInput'),
      dataFileName: document.getElementById('dataFileName'),
      linksList: document.getElementById('linksList'),
      statusText: document.getElementById('statusText'),
      functionsModal: document.getElementById('functionsModal'),
      functionsCloseBtn: document.getElementById('functionsCloseBtn'),
      linkEditorModal: document.getElementById('linkEditorModal'),
      editorTitle: document.getElementById('editorTitle'),
      editorGroupHint: document.getElementById('editorGroupHint'),
      editorUrlInput: document.getElementById('editorUrlInput'),
      editorNameInput: document.getElementById('editorNameInput'),
      editorIconPreview: document.getElementById('editorIconPreview'),
      editorSaveBtn: document.getElementById('editorSaveBtn'),
      editorCancelBtn: document.getElementById('editorCancelBtn'),
      widgetConfigModal: document.getElementById('widgetConfigModal'),
      clockTimezoneInput: document.getElementById('clockTimezoneInput'),
      clockShowSecondsInput: document.getElementById('clockShowSecondsInput'),
      timeZoneList: document.getElementById('timeZoneList'),
      widgetConfigCancelBtn: document.getElementById('widgetConfigCancelBtn'),
      widgetConfigSaveBtn: document.getElementById('widgetConfigSaveBtn'),
      widgetAddMenu: document.getElementById('widgetAddMenu'),
      addClockWidgetBtn: document.getElementById('addClockWidgetBtn'),
      linkContextMenu: document.getElementById('linkContextMenu'),
      ctxEditLinkBtn: document.getElementById('ctxEditLinkBtn'),
      ctxDeleteLinkBtn: document.getElementById('ctxDeleteLinkBtn')
    };

    const dragState = {
      linkId: null,
      groupName: null
    };

    const timeFormatterCache = new Map();

    function snapshotState() {
      return {
        schemaVersion: FILE_SCHEMA_VERSION,
        categories: state.categories,
        links: state.links,
        groupOrder: state.groupOrder,
        widgets: state.widgets
      };
    }

    function writeCacheSnapshot() {
      try {
        localStorage.setItem(CACHE_STORAGE_KEY, JSON.stringify(snapshotState()));
      } catch {
        // Ignore cache write issues.
      }
    }

    function resetState() {
      state.categories = [];
      state.links = [];
      state.groupOrder = [];
      state.widgets = [];
    }

    function getDefaultTimeZone() {
      const guessed = Intl.DateTimeFormat().resolvedOptions().timeZone;
      return normalizeTimeZone(guessed) || 'UTC';
    }

    function normalizeTimeZone(value) {
      const candidate = String(value || '').trim();
      if (!candidate) return '';
      try {
        new Intl.DateTimeFormat('de-DE', { timeZone: candidate }).format(new Date());
        return candidate;
      } catch {
        return '';
      }
    }

    function parseWidgetBoolean(value, fallback = true) {
      if (typeof value === 'boolean') return value;
      if (typeof value === 'number') return value !== 0;
      if (typeof value === 'string') {
        const lowered = value.trim().toLowerCase();
        if (['0', 'false', 'no', 'off'].includes(lowered)) return false;
        if (['1', 'true', 'yes', 'on'].includes(lowered)) return true;
      }
      return fallback;
    }

    function normalizeWidget(rawWidget) {
      if (!rawWidget || typeof rawWidget !== 'object') return null;
      const type = String(rawWidget.type || '').trim();
      if (type !== WIDGET_TYPE_ANALOG_CLOCK) return null;

      const timezone = normalizeTimeZone(rawWidget.timezone) || getDefaultTimeZone();
      const showSeconds = parseWidgetBoolean(rawWidget.showSeconds, true);
      return {
        id: String(rawWidget.id || crypto.randomUUID()),
        type,
        timezone,
        showSeconds
      };
    }

    function applyParsedData(parsed) {
      resetState();
      const source = parsed && typeof parsed === 'object' ? parsed : {};

      if (Array.isArray(source.categories)) {
        state.categories = [...new Set(source.categories.map((item) => String(item).trim()).filter(Boolean))];
      }
      if (Array.isArray(source.groupOrder)) {
        state.groupOrder = [...new Set(source.groupOrder.map((item) => String(item).trim()).filter(Boolean))];
      }
      if (Array.isArray(source.links)) {
        state.links = source.links
          .filter((item) => item && item.url)
          .map((item) => {
            const normalized = normalizeUrl(String(item.url || ''));
            if (!normalized) return null;

            const category = String(item.category || '').trim() || 'Allgemein';
            if (!state.categories.includes(category)) state.categories.push(category);

            return {
              id: String(item.id || crypto.randomUUID()),
              url: normalized,
              name: String(item.name || inferNameFromUrl(normalized)),
              category,
              image: String(item.image || ''),
              icon: String(item.icon || domainIcon(normalized))
            };
          })
          .filter(Boolean);
      }
      if (Array.isArray(source.widgets)) {
        state.widgets = source.widgets
          .map((item) => normalizeWidget(item))
          .filter(Boolean);
      }

      syncGroupOrder();
    }

    function updateDataFileLabel() {
      const filePart = uiState.dataFileName ? 'Datei: ' + uiState.dataFileName : 'Keine Datei verbunden.';
      const dirtyPart = uiState.hasUnsavedChanges ? ' Ungespeicherte Änderungen.' : '';
      const fallbackPart = FILE_PICKER_AVAILABLE ? '' : ' Browser ohne Dateizugriff: nutze "JSON exportieren".';
      dom.dataFileName.textContent = filePart + dirtyPart + fallbackPart;
    }

    async function writeSnapshotToHandle(handle) {
      const writable = await handle.createWritable();
      await writable.write(JSON.stringify(snapshotState(), null, 2));
      await writable.close();
    }

    function queueSaveToCurrentHandle() {
      if (!uiState.dataFileHandle) return;
      if (uiState.isSaving) {
        uiState.pendingSave = true;
        return;
      }

      uiState.isSaving = true;
      const handle = uiState.dataFileHandle;

      writeSnapshotToHandle(handle)
        .then(() => {
          if (uiState.dataFileHandle === handle) {
            uiState.hasUnsavedChanges = false;
            updateDataFileLabel();
          }
        })
        .catch(() => {
          uiState.dataFileHandle = null;
          uiState.dataFileName = '';
          setStatus('Automatisches Speichern fehlgeschlagen. Bitte erneut speichern.', true);
          updateDataFileLabel();
        })
        .finally(() => {
          uiState.isSaving = false;
          if (uiState.pendingSave) {
            uiState.pendingSave = false;
            queueSaveToCurrentHandle();
          }
        });
    }

    function save() {
      uiState.hasUnsavedChanges = true;
      updateDataFileLabel();
      writeCacheSnapshot();
      queueSaveToCurrentHandle();
    }

    async function importDataFromText(rawText, sourceLabel = 'JSON-Datei') {
      let parsed;
      try {
        parsed = JSON.parse(rawText);
      } catch {
        throw new Error('invalid-json');
      }

      applyParsedData(parsed);
      uiState.hasUnsavedChanges = false;
      renderLinks();
      updateDataFileLabel();
      writeCacheSnapshot();
      setStatus(sourceLabel + ' geladen.');
    }

    async function tryAutoLoadDefaultJson() {
      for (const fileName of AUTO_LOAD_CANDIDATE_FILES) {
        try {
          const response = await fetch('./' + fileName, { cache: 'no-store' });
          if (!response.ok) continue;

          const text = await response.text();
          uiState.dataFileHandle = null;
          uiState.dataFileName = fileName;
          await importDataFromText(text, fileName);
          return true;
        } catch {
          // Try next candidate.
        }
      }
      return false;
    }

    function loadFromCacheSnapshot() {
      try {
        const raw = localStorage.getItem(CACHE_STORAGE_KEY);
        if (!raw) return false;
        const parsed = JSON.parse(raw);
        applyParsedData(parsed);
        uiState.dataFileName = uiState.dataFileName || DEFAULT_FILE_NAME;
        uiState.hasUnsavedChanges = false;
        renderLinks();
        updateDataFileLabel();
        return true;
      } catch {
        return false;
      }
    }

    async function openDataFile() {
      if (!FILE_PICKER_AVAILABLE) {
        dom.importFileInput.click();
        return;
      }

      try {
        const handles = await window.showOpenFilePicker({
          multiple: false,
          types: [
            {
              description: 'LinkMan JSON',
              accept: { 'application/json': ['.json'] }
            }
          ]
        });
        if (!handles.length) return;

        const handle = handles[0];
        const file = await handle.getFile();
        const text = await file.text();

        uiState.dataFileHandle = handle;
        uiState.dataFileName = file.name || DEFAULT_FILE_NAME;
        await importDataFromText(text, 'JSON-Datei');
      } catch (error) {
        if (error && error.name === 'AbortError') return;
        setStatus('Datei konnte nicht geöffnet werden.', true);
      }
    }

    async function handleImportInputChange(event) {
      const input = event.target;
      const file = input.files && input.files[0];
      if (!file) return;

      try {
        const text = await file.text();
        uiState.dataFileHandle = null;
        uiState.dataFileName = file.name || DEFAULT_FILE_NAME;
        await importDataFromText(text, 'JSON-Datei');
      } catch {
        setStatus('Datei konnte nicht importiert werden.', true);
      } finally {
        input.value = '';
        updateDataFileLabel();
      }
    }

    function exportDataAsDownload(fileName = DEFAULT_FILE_NAME) {
      const blob = new Blob([JSON.stringify(snapshotState(), null, 2)], {
        type: 'application/json; charset=utf-8'
      });
      const downloadUrl = URL.createObjectURL(blob);
      const link = document.createElement('a');
      link.href = downloadUrl;
      link.download = fileName;
      document.body.appendChild(link);
      link.click();
      link.remove();
      URL.revokeObjectURL(downloadUrl);
    }

    async function saveDataFile(saveAs = false) {
      try {
        if (!FILE_PICKER_AVAILABLE) {
          const name = uiState.dataFileName || DEFAULT_FILE_NAME;
          exportDataAsDownload(name);
          uiState.dataFileHandle = null;
          uiState.dataFileName = name;
          uiState.hasUnsavedChanges = false;
          updateDataFileLabel();
          setStatus('JSON exportiert: ' + name);
          return;
        }

        let handle = uiState.dataFileHandle;
        if (!handle || saveAs) {
          handle = await window.showSaveFilePicker({
            suggestedName: uiState.dataFileName || DEFAULT_FILE_NAME,
            types: [
              {
                description: 'LinkMan JSON',
                accept: { 'application/json': ['.json'] }
              }
            ]
          });
        }
        if (!handle) return;

        await writeSnapshotToHandle(handle);
        uiState.dataFileHandle = handle;
        uiState.dataFileName = handle.name || uiState.dataFileName || DEFAULT_FILE_NAME;
        uiState.hasUnsavedChanges = false;
        updateDataFileLabel();
        setStatus('JSON gespeichert: ' + uiState.dataFileName);
      } catch (error) {
        if (error && error.name === 'AbortError') return;
        setStatus('Speichern fehlgeschlagen.', true);
      }
    }

    function loadLegacyLocalData() {
      try {
        const raw = localStorage.getItem(LEGACY_STORAGE_KEY);
        if (!raw) return false;
        const parsed = JSON.parse(raw);
        applyParsedData(parsed);
        return true;
      } catch {
        return false;
      }
    }

    function setStatus(text, isError = false) {
      const message = String(text || '').trim();
      if (uiState.statusTimer) {
        clearTimeout(uiState.statusTimer);
        uiState.statusTimer = 0;
      }

      dom.statusText.textContent = message;
      dom.statusText.style.color = isError ? '#ff9b83' : 'var(--muted)';
      if (!message) return;

      uiState.statusTimer = window.setTimeout(() => {
        dom.statusText.textContent = '';
        uiState.statusTimer = 0;
      }, 10000);
    }

    function normalizeUrl(input) {
      const trimmed = String(input || '').trim();
      if (!trimmed) return null;
      try {
        return new URL(trimmed).toString();
      } catch {
        try {
          return new URL('https://' + trimmed).toString();
        } catch {
          return null;
        }
      }
    }

    function directFaviconUrl(url) {
      try {
        const parsed = new URL(url);
        return parsed.origin + '/favicon.ico';
      } catch {
        return '';
      }
    }

    function duckDuckGoIconUrl(url) {
      try {
        const parsed = new URL(url);
        return 'https://icons.duckduckgo.com/ip3/' + parsed.hostname + '.ico';
      } catch {
        return '';
      }
    }

    function domainIcon(url) {
      return 'https://www.google.com/s2/favicons?sz=128&domain_url=' + encodeURIComponent(url);
    }

    function getIconCandidates(url, storedIcon = '') {
      const list = [];
      const pushUnique = (value) => {
        const normalized = String(value || '').trim();
        if (!normalized) return;
        if (list.includes(normalized)) return;
        list.push(normalized);
      };

      pushUnique(storedIcon);
      pushUnique(directFaviconUrl(url));
      pushUnique(duckDuckGoIconUrl(url));
      pushUnique(domainIcon(url));
      return list;
    }

    function initialsFromLabel(label) {
      const text = String(label || '').trim();
      if (!text) return '?';
      const parts = text.split(/\s+/).filter(Boolean);
      if (parts.length >= 2) {
        return (parts[0][0] + parts[1][0]).toUpperCase();
      }
      return text.slice(0, 2).toUpperCase();
    }

    function fallbackIconDataUrl(label) {
      const initials = initialsFromLabel(label);
      const svg =
        '<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 64 64">' +
          '<defs><linearGradient id="g" x1="0" y1="0" x2="1" y2="1">' +
            '<stop offset="0%" stop-color="#3a2e2a"/>' +
            '<stop offset="100%" stop-color="#302522"/>' +
          '</linearGradient></defs>' +
          '<rect x="1.5" y="1.5" width="61" height="61" rx="14" fill="url(#g)" stroke="#6d4f46" stroke-width="3"/>' +
          '<text x="32" y="39" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="22" font-weight="700" fill="#ffd6cc">' +
            escapeHtmlClient(initials) +
          '</text>' +
        '</svg>';
      return 'data:image/svg+xml;utf8,' + encodeURIComponent(svg);
    }

    function setIconSource(imgElement, url, label = '', storedIcon = '') {
      if (!imgElement || !url) return;
      const candidates = getIconCandidates(url, storedIcon);
      if (!candidates.length) return;
      const first = candidates[0];
      const fallbacks = candidates.slice(1);
      imgElement.setAttribute('data-icon-fallbacks', JSON.stringify(fallbacks));
      imgElement.setAttribute('data-icon-label', String(label || '').trim());
      imgElement.src = first;
    }

    function shiftIconFallback(imgElement) {
      if (!imgElement) return;

      let fallbacks = [];
      try {
        const raw = imgElement.getAttribute('data-icon-fallbacks') || '[]';
        const parsed = JSON.parse(raw);
        if (Array.isArray(parsed)) {
          fallbacks = parsed.map((item) => String(item || '').trim()).filter(Boolean);
        }
      } catch {
        fallbacks = [];
      }

      if (fallbacks.length) {
        const [next, ...rest] = fallbacks;
        imgElement.setAttribute('data-icon-fallbacks', JSON.stringify(rest));
        imgElement.src = next;
        return;
      }

      const label = imgElement.getAttribute('data-icon-label') || '';
      const fallback = fallbackIconDataUrl(label);
      if (imgElement.src !== fallback) {
        imgElement.src = fallback;
      }
    }

    function escapeHtmlClient(input) {
      return String(input)
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#39;');
    }

    function splitCategory(category) {
      const raw = String(category || '').trim();
      if (!raw) return { group: 'Sonstiges', section: 'Allgemein' };
      const parts = raw.split('/').map((part) => part.trim()).filter(Boolean);
      if (parts.length >= 2) return { group: parts[0], section: parts.slice(1).join(' / ') };
      return { group: parts[0] || 'Sonstiges', section: 'Allgemein' };
    }

    function buildCategory(group, section) {
      const g = String(group || '').trim() || 'Sonstiges';
      const s = String(section || '').trim() || 'Allgemein';
      if (s.toLowerCase() === 'allgemein') return g;
      return g + ' / ' + s;
    }

    function fitViewport() {
      dom.wrap.style.transform = 'none';
      dom.wrap.style.width = '100%';
    }

    function applyBoardMasonryLayout() {
      const boardStyle = window.getComputedStyle(dom.linksList);
      const rowHeight = parseFloat(boardStyle.getPropertyValue('grid-auto-rows'));
      const rowGap = parseFloat(boardStyle.getPropertyValue('row-gap'));
      if (!rowHeight || Number.isNaN(rowHeight)) return;

      const cards = dom.linksList.querySelectorAll('.group-card, .widget-card');
      for (const card of cards) {
        card.style.gridRowEnd = 'auto';
      }
      for (const card of cards) {
        const cardHeight = card.getBoundingClientRect().height;
        const span = Math.max(1, Math.ceil((cardHeight + rowGap) / (rowHeight + rowGap)));
        card.style.gridRowEnd = 'span ' + span;
      }
    }

    function getGroupNamesFromState() {
      const names = [];
      const seen = new Set();

      for (const category of state.categories) {
        const group = splitCategory(category).group;
        if (!seen.has(group)) {
          seen.add(group);
          names.push(group);
        }
      }
      for (const link of state.links) {
        const group = splitCategory(link.category).group;
        if (!seen.has(group)) {
          seen.add(group);
          names.push(group);
        }
      }
      return names;
    }

    function syncGroupOrder() {
      const currentGroups = getGroupNamesFromState();
      const currentSet = new Set(currentGroups);
      const nextOrder = state.groupOrder.filter((name) => currentSet.has(name));
      for (const group of currentGroups) {
        if (!nextOrder.includes(group)) nextOrder.push(group);
      }
      state.groupOrder = nextOrder;
      return state.groupOrder;
    }

    function findInsertIndexForGroup(groupName) {
      for (let i = state.links.length - 1; i >= 0; i--) {
        const split = splitCategory(state.links[i].category);
        if (split.group === groupName) {
          return i + 1;
        }
      }
      return state.links.length;
    }

    function getUniqueGroupName(baseName) {
      const base = String(baseName || 'Neue Gruppe').trim() || 'Neue Gruppe';
      const existing = new Set(syncGroupOrder().map((name) => name.toLowerCase()));
      if (!existing.has(base.toLowerCase())) return base;

      let counter = 2;
      let candidate = base + ' (' + counter + ')';
      while (existing.has(candidate.toLowerCase())) {
        counter++;
        candidate = base + ' (' + counter + ')';
      }
      return candidate;
    }

    function getWidgetById(widgetId) {

    function setTimeZoneOptions(preferred = '') {
      const options = [];
      const seen = new Set();
      const addOption = (zone) => {
        const value = String(zone || '').trim();
        if (!value || seen.has(value)) return;
        seen.add(value);
        options.push(value);
      };

      const preferredZone = normalizeTimeZone(preferred);
      if (preferredZone) addOption(preferredZone);
      addOption(getDefaultTimeZone());
      for (const zone of COMMON_TIME_ZONES) {
        addOption(zone);
      }

      if (typeof Intl.supportedValuesOf === 'function') {
        try {
          const supported = Intl.supportedValuesOf('timeZone');
          for (const zone of supported) addOption(zone);
        } catch {
          // Keep common fallback list.
        }
      }

      dom.timeZoneList.innerHTML = options
        .map((zone) => '<option value="' + escapeHtmlClient(zone) + '"></option>')
        .join('');
    }

    function getFormatterForTimeZone(timeZone) {
      if (timeFormatterCache.has(timeZone)) {
        return timeFormatterCache.get(timeZone);
      }

      const formatter = new Intl.DateTimeFormat('en-GB', {
        timeZone,
        hour: '2-digit',
        minute: '2-digit',
        second: '2-digit',
        hour12: false,
        hourCycle: 'h23'
      });
      timeFormatterCache.set(timeZone, formatter);
      return formatter;
    }

    function getTimePartsInZone(date, timeZone) {
      try {
        const formatter = getFormatterForTimeZone(timeZone);
        const parts = formatter.formatToParts(date);
        const values = { hour: 0, minute: 0, second: 0 };

        for (const part of parts) {
          if (part.type === 'hour' || part.type === 'minute' || part.type === 'second') {
            const parsed = Number(part.value);
            if (Number.isFinite(parsed)) values[part.type] = parsed;
          }
        }
        return values;
      } catch {
        return {
          hour: date.getHours(),
          minute: date.getMinutes(),
          second: date.getSeconds()
        };
      }
    }

    function renderClockWidgetCard(widget) {
      const id = escapeHtmlClient(widget.id);
      const timezone = escapeHtmlClient(widget.timezone);
      const secondClass = widget.showSeconds ? '' : ' hidden';

      return '<section class="widget-card" data-widget-id="' + id + '">' +
        '<header class="widget-head">' +
          '<h2 class="widget-title">Analoge Uhr</h2>' +
          '<div class="group-actions">' +
            '<button class="icon-btn group-action-btn widget-config-btn" type="button" data-widget-id="' + id + '" title="Eigenschaften" aria-label="Widget-Eigenschaften">' + ICON_GEAR + '</button>' +
            '<button class="icon-btn group-action-btn group-delete-btn widget-delete-btn" type="button" data-widget-id="' + id + '" title="Widget löschen" aria-label="Widget löschen">' + ICON_TRASH + '</button>' +
          '</div>' +
        '</header>' +
        '<div class="widget-body">' +
          '<div class="analog-clock" data-widget-id="' + id + '" data-timezone="' + timezone + '" data-show-seconds="' + (widget.showSeconds ? '1' : '0') + '">' +
            '<span class="clock-hand clock-hour"></span>' +
            '<span class="clock-hand clock-minute"></span>' +
            '<span class="clock-hand clock-second' + secondClass + '"></span>' +
            '<span class="clock-center-dot"></span>' +
          '</div>' +
          '<p class="widget-meta">Zeitzone: ' + timezone + '</p>' +
          '<p class="widget-meta widget-time-value">--:--</p>' +
        '</div>' +
      '</section>';
    }

    function renderWidget(widget) {

    }

    function updateClockWidgets() {
      const clocks = dom.linksList.querySelectorAll('.analog-clock');
      if (!clocks.length) return;

      const now = new Date();
      for (const clock of clocks) {
        const timeZone = normalizeTimeZone(clock.getAttribute('data-timezone')) || getDefaultTimeZone();
        const showSeconds = clock.getAttribute('data-show-seconds') === '1';
        const parts = getTimePartsInZone(now, timeZone);

        const hour = parts.hour % 12;
        const minute = parts.minute;
        const second = parts.second;
        const hourAngle = (hour + minute / 60 + second / 3600) * 30;
        const minuteAngle = (minute + second / 60) * 6;
        const secondAngle = second * 6;

        const hourHand = clock.querySelector('.clock-hour');
        const minuteHand = clock.querySelector('.clock-minute');
        const secondHand = clock.querySelector('.clock-second');
        if (hourHand) hourHand.style.transform = 'rotate(' + hourAngle + 'deg)';
        if (minuteHand) minuteHand.style.transform = 'rotate(' + minuteAngle + 'deg)';
        if (secondHand) {
          secondHand.classList.toggle('hidden', !showSeconds);
          if (showSeconds) secondHand.style.transform = 'rotate(' + secondAngle + 'deg)';
        }

        const widgetCard = clock.closest('.widget-card');
        const timeValue = widgetCard ? widgetCard.querySelector('.widget-time-value') : null;
        if (timeValue) {
          const hh = String(parts.hour).padStart(2, '0');
          const mm = String(parts.minute).padStart(2, '0');
          const ss = String(parts.second).padStart(2, '0');
          timeValue.textContent = showSeconds ? (hh + ':' + mm + ':' + ss) : (hh + ':' + mm);
        }
      }
    }

    function renderLinks() {
      const grouped = {};
      const categoryGroups = syncGroupOrder();
      const widgetCards = state.widgets.map((widget) => renderWidget(widget)).join('');

      for (const groupName of categoryGroups) {
        grouped[groupName] = [];
      }
      for (const link of state.links) {
        const split = splitCategory(link.category);
        if (!grouped[split.group]) grouped[split.group] = [];
        grouped[split.group].push(link);
      }

      if (!categoryGroups.length && !widgetCards) {
        dom.linksList.innerHTML = '<div class="empty">Noch keine Gruppen oder Widgets vorhanden. Oben auf + oder auf das Widget-Symbol klicken.</div>';
        fitViewport();
        return;
      }

      const groupCards = categoryGroups.map((groupName) => {
        const groupNameEscaped = escapeHtmlClient(groupName);
        const linkItems = grouped[groupName].map((link) => {
          const iconCandidates = getIconCandidates(link.url, link.icon);
          const icon = escapeHtmlClient(iconCandidates[0] || fallbackIconDataUrl(link.name));
          const iconFallbacks = escapeHtmlClient(JSON.stringify(iconCandidates.slice(1)));
          const iconLabel = escapeHtmlClient(link.name || inferNameFromUrl(link.url));
          const name = escapeHtmlClient(link.name);
          const url = escapeHtmlClient(link.url);
          const id = escapeHtmlClient(link.id);

          return '<article class="link-item" draggable="true" data-link-id="' + id + '" data-group-name="' + groupNameEscaped + '">' +
            '<div class="link-main">' +
              '<img class="favicon" src="' + icon + '" data-icon-fallbacks="' + iconFallbacks + '" data-icon-label="' + iconLabel + '" alt="Icon" loading="lazy" />' +
              '<a class="link-action" href="' + url + '" target="_blank" rel="noreferrer noopener">' + name + '</a>' +
            '</div>' +
          '</article>';
        }).join('');

        const content = linkItems || '<div class="group-empty">Links hier ablegen</div>';

        return '<section class="group-card" draggable="true" data-group-name="' + groupNameEscaped + '">' +
          '<header class="group-head">' +
            '<h2 class="group-title" data-group-name="' + groupNameEscaped + '" title="Doppelklick zum Umbenennen">' + groupNameEscaped + '</h2>' +
            '<div class="group-actions">' +
              '<button class="icon-btn group-action-btn group-add-link-btn" type="button" draggable="false" data-group-name="' + groupNameEscaped + '" title="Link hinzufügen" aria-label="Link hinzufügen">' + ICON_PLUS + '</button>' +
              '<button class="icon-btn group-action-btn group-delete-btn" type="button" draggable="false" data-group-name="' + groupNameEscaped + '" title="Gruppe löschen" aria-label="Gruppe löschen">' + ICON_TRASH + '</button>' +
            '</div>' +
          '</header>' +
          '<div class="links" data-group-name="' + groupNameEscaped + '">' + content + '</div>' +
        '</section>';
      }).join('');

      dom.linksList.innerHTML = widgetCards + groupCards;

      fitViewport();
      requestAnimationFrame(() => {
        applyBoardMasonryLayout();
        updateClockWidgets();
      });
    }

    function moveLink(draggedId, targetGroupName, beforeId = '') {
      const sourceIndex = state.links.findIndex((item) => item.id === draggedId);
      if (sourceIndex === -1) return;

      const [dragged] = state.links.splice(sourceIndex, 1);
      const oldSplit = splitCategory(dragged.category);
      const targetGroup = String(targetGroupName || '').trim() || oldSplit.group;
      const nextCategory = buildCategory(targetGroup, oldSplit.section);

      dragged.category = nextCategory;
      if (!state.categories.includes(nextCategory)) {
        state.categories.push(nextCategory);
      }

      let insertIndex = findInsertIndexForGroup(targetGroup);
      if (beforeId) {
        const beforeIndex = state.links.findIndex((item) => item.id === beforeId);
        if (beforeIndex !== -1) insertIndex = beforeIndex;
      }

      state.links.splice(insertIndex, 0, dragged);
      syncGroupOrder();
      save();
      renderLinks();
      setStatus('Link verschoben.');
    }

    function getGroupDropDirection(event, element) {
      const rect = element.getBoundingClientRect();
      const relX = (event.clientX - rect.left) / Math.max(rect.width, 1);
      const relY = (event.clientY - rect.top) / Math.max(rect.height, 1);
      const xDelta = relX - 0.5;
      const yDelta = relY - 0.5;
      if (Math.abs(xDelta) >= Math.abs(yDelta)) {
        return xDelta >= 0 ? 'right' : 'left';
      }
      return yDelta >= 0 ? 'bottom' : 'top';
    }

    function moveGroup(draggedGroupName, targetGroupName, insertAfter = false) {
      const dragged = String(draggedGroupName || '').trim();
      const target = String(targetGroupName || '').trim();
      if (!dragged || !target || dragged === target) return false;

      const order = [...syncGroupOrder()];
      const fromIndex = order.indexOf(dragged);
      const targetIndex = order.indexOf(target);
      if (fromIndex === -1 || targetIndex === -1) return false;

      const beforeOrder = order.join('\u001f');

      order.splice(fromIndex, 1);
      const adjustedTargetIndex = order.indexOf(target);
      const insertIndex = insertAfter ? adjustedTargetIndex + 1 : adjustedTargetIndex;
      order.splice(insertIndex, 0, dragged);

      if (beforeOrder === order.join('\u001f')) return false;

      state.groupOrder = order;
      save();
      renderLinks();
      setStatus('Kategorie-Container verschoben.');
      return true;
    }

    function moveGroupToEnd(draggedGroupName) {
      const dragged = String(draggedGroupName || '').trim();
      if (!dragged) return false;

      const order = [...syncGroupOrder()];
      const fromIndex = order.indexOf(dragged);
      if (fromIndex === -1) return false;
      if (fromIndex === order.length - 1) return false;

      order.splice(fromIndex, 1);
      order.push(dragged);
      state.groupOrder = order;

      save();
      renderLinks();
      setStatus('Kategorie-Container verschoben.');
      return true;
    }

    function renameGroup(oldGroupName, newGroupName) {
      const oldName = String(oldGroupName || '').trim();
      const nextName = String(newGroupName || '').trim();
      if (!oldName || !nextName || oldName === nextName) {
        renderLinks();
        return;
      }

      state.links = state.links.map((l) => {
        const split = splitCategory(l.category);
        if (split.group !== oldName) return l;
        return {
          ...l,
          category: buildCategory(nextName, split.section)
        };
      });

      state.categories = state.categories.map((c) => {
        const split = splitCategory(c);
        if (split.group !== oldName) return c;
        return buildCategory(nextName, split.section);
      });
      state.categories = [...new Set(state.categories)];
      state.groupOrder = state.groupOrder.map((g) => (g === oldName ? nextName : g));
      state.groupOrder = [...new Set(state.groupOrder)];
      syncGroupOrder();

      save();
      renderLinks();
      setStatus('Gruppe umbenannt: ' + oldName + ' -> ' + nextName);
    }

    dom.functionsBtn.addEventListener('click', openFunctionsModal);
    dom.functionsCloseBtn.addEventListener('click', closeFunctionsModal);
    dom.functionsModal.addEventListener('click', (event) => {
      if (event.target && event.target.getAttribute('data-close-functions') === 'true') {
        closeFunctionsModal();
      }
    });

    dom.openDataBtn.addEventListener('click', () => {
      void openDataFile();
    });
    dom.saveDataBtn.addEventListener('click', () => {
      void saveDataFile(false);
    });
    dom.saveAsDataBtn.addEventListener('click', () => {
      void saveDataFile(true);
    });
    dom.exportDataBtn.addEventListener('click', () => {
      exportDataAsDownload(uiState.dataFileName || DEFAULT_FILE_NAME);
      uiState.hasUnsavedChanges = false;
      updateDataFileLabel();
      setStatus('JSON exportiert.');
    });
    dom.importFileInput.addEventListener('change', (event) => {
      void handleImportInputChange(event);
    });

    dom.widgetMenuBtn.addEventListener('click', (event) => {
      event.stopPropagation();
      toggleWidgetAddMenu();
    });
    dom.addClockWidgetBtn.addEventListener('click', addClockWidget);

    dom.addGroupBtn.addEventListener('click', addGroup);
    dom.editorCancelBtn.addEventListener('click', closeLinkEditor);
    dom.editorSaveBtn.addEventListener('click', saveLinkEditor);
    dom.widgetConfigCancelBtn.addEventListener('click', closeWidgetConfigModal);
    dom.widgetConfigSaveBtn.addEventListener('click', saveClockWidgetConfig);

    dom.editorNameInput.addEventListener('input', () => {
      uiState.editor.nameTouched = true;
    });

    dom.editorUrlInput.addEventListener('input', () => {
      scheduleEditorSuggestion();
    });

    dom.editorUrlInput.addEventListener('paste', () => {
      setTimeout(scheduleEditorSuggestion, 40);
    });

    dom.editorIconPreview.addEventListener('error', () => {
      shiftIconFallback(dom.editorIconPreview);
    });

    dom.widgetConfigModal.addEventListener('click', (event) => {
      if (event.target && event.target.getAttribute('data-close-widget-modal') === 'true') {
        closeWidgetConfigModal();
      }
    });

    dom.widgetConfigModal.addEventListener('keydown', (event) => {
      if (event.key === 'Escape') {
        closeWidgetConfigModal();
      }
      if (event.key === 'Enter') {
        event.preventDefault();
        saveClockWidgetConfig();
      }
    });

    dom.linkEditorModal.addEventListener('click', (event) => {
      if (event.target && event.target.getAttribute('data-close-modal') === 'true') {
        closeLinkEditor();
      }
    });

    dom.linkEditorModal.addEventListener('keydown', (event) => {
      if (event.key === 'Escape') {
        closeLinkEditor();
      }
      if (event.key === 'Enter') {
        event.preventDefault();
        saveLinkEditor();
      }
    });

    dom.linksList.addEventListener('click', (event) => {
      const widgetConfigButton = event.target.closest('.widget-config-btn');
      if (widgetConfigButton) {
        const widgetId = widgetConfigButton.getAttribute('data-widget-id') || '';
        openClockWidgetConfig(widgetId);
        return;
      }

      const widgetDeleteButton = event.target.closest('.widget-delete-btn');
      if (widgetDeleteButton) {
        const widgetId = widgetDeleteButton.getAttribute('data-widget-id') || '';
        deleteWidget(widgetId);
        return;
      }

      const addButton = event.target.closest('.group-add-link-btn');
      if (addButton) {
        const groupName = addButton.getAttribute('data-group-name') || '';
        openLinkEditorForCreate(groupName);
        return;
      }

      const deleteButton = event.target.closest('.group-delete-btn');
      if (deleteButton) {
        const groupName = deleteButton.getAttribute('data-group-name') || '';
        deleteGroup(groupName);
      }
    });

    dom.linksList.addEventListener('contextmenu', (event) => {
      const linkItem = event.target.closest('.link-item');
      if (!linkItem) return;
      event.preventDefault();

      const linkId = linkItem.getAttribute('data-link-id') || '';
      openLinkContextMenu(linkId, event.clientX, event.clientY);
    });

    dom.linksList.addEventListener('error', (event) => {
      const img = event.target && event.target.closest ? event.target.closest('img.favicon') : null;
      if (!img) return;
      shiftIconFallback(img);
    }, true);

    dom.ctxEditLinkBtn.addEventListener('click', () => {
      const linkId = uiState.contextMenu.linkId;
      if (!linkId) return;
      openLinkEditorForEdit(linkId);
    });

    dom.ctxDeleteLinkBtn.addEventListener('click', () => {
      const linkId = uiState.contextMenu.linkId;
      deleteLink(linkId);
    });

    document.addEventListener('click', (event) => {
      if (!uiState.contextMenu.open) return;
      if (!dom.linkContextMenu.contains(event.target)) {
        closeContextMenu();
      }
    });

    document.addEventListener('click', (event) => {
      if (!uiState.widgetMenu.open) return;
      const clickedInsideMenu = dom.widgetAddMenu.contains(event.target);
      const clickedButton = dom.widgetMenuBtn.contains(event.target);
      if (!clickedInsideMenu && !clickedButton) {
        closeWidgetAddMenu();
      }
    });

    document.addEventListener('keydown', (event) => {
      if (event.key === 'Escape') {
        closeFunctionsModal();
        closeContextMenu();
        closeWidgetAddMenu();
        closeWidgetConfigModal();
      }
    });

    window.addEventListener('scroll', closeContextMenu, true);
    window.addEventListener('scroll', closeWidgetAddMenu, true);

    dom.linksList.addEventListener('dragstart', (e) => {
      if (e.target.closest('.group-action-btn')) {
        e.preventDefault();
        return;
      }

      closeContextMenu();
      const linkItem = e.target.closest('.link-item');
      if (linkItem) {
        dragState.linkId = linkItem.getAttribute('data-link-id');
        dragState.groupName = null;
        linkItem.classList.add('dragging');

        if (e.dataTransfer) {
          e.dataTransfer.effectAllowed = 'move';
          e.dataTransfer.setData('text/plain', dragState.linkId || '');
        }
        return;
      }

      const groupCard = e.target.closest('.group-card');
      if (!groupCard) return;

      dragState.groupName = groupCard.getAttribute('data-group-name');
      dragState.linkId = null;
      groupCard.classList.add('dragging');

      if (e.dataTransfer) {
        e.dataTransfer.effectAllowed = 'move';
        e.dataTransfer.setData('text/plain', dragState.groupName || '');
      }
    });

    dom.linksList.addEventListener('dragover', (e) => {
      if (dragState.linkId) {
        const linkItem = e.target.closest('.link-item');
        const links = e.target.closest('.links');
        const groupCard = e.target.closest('.group-card');
        if (!linkItem && !links && !groupCard) return;

        e.preventDefault();
        clearDropStyles();

        if (linkItem && linkItem.getAttribute('data-link-id') !== dragState.linkId) {
          linkItem.classList.add('drop-before');
          return;
        }

        if (links) {
          links.classList.add('drag-over');
          return;
        }

        groupCard.classList.add('drag-over');
        return;
      }

      if (dragState.groupName) {
        if (!dom.linksList.contains(e.target)) return;

        e.preventDefault();
        clearDropStyles();

        const targetCard = e.target.closest('.group-card');
        if (!targetCard) {
          dom.linksList.classList.add('group-drop-end');
          return;
        }

        const targetGroup = targetCard.getAttribute('data-group-name') || '';
        if (!targetGroup) {
          dom.linksList.classList.add('group-drop-end');
          return;
        }
        if (targetGroup === dragState.groupName) return;

        targetCard.classList.add('drag-over');
        const direction = getGroupDropDirection(e, targetCard);
        targetCard.classList.add('group-drop-' + direction);
      }
    });

    dom.linksList.addEventListener('drop', (e) => {
      if (dragState.linkId) {
        const linkItem = e.target.closest('.link-item');
        const links = e.target.closest('.links');
        const groupCard = e.target.closest('.group-card');

        let targetGroup = '';
        let beforeId = '';

        if (linkItem) {
          beforeId = linkItem.getAttribute('data-link-id') || '';
          targetGroup = linkItem.getAttribute('data-group-name') || '';
        } else if (links) {
          targetGroup = links.getAttribute('data-group-name') || '';
        } else if (groupCard) {
          targetGroup = groupCard.getAttribute('data-group-name') || '';
        }

        if (!targetGroup) return;

        e.preventDefault();
        clearDropStyles();

        if (beforeId === dragState.linkId) {
          dragState.linkId = null;
          clearDragStyles();
          return;
        }

        moveLink(dragState.linkId, targetGroup, beforeId);
        dragState.linkId = null;
        clearDragStyles();
        return;
      }

      if (dragState.groupName) {
        if (!dom.linksList.contains(e.target)) return;

        e.preventDefault();
        clearDropStyles();

        const targetCard = e.target.closest('.group-card');
        if (!targetCard) {
          moveGroupToEnd(dragState.groupName);
          dragState.groupName = null;
          clearDragStyles();
          return;
        }

        const targetGroup = targetCard.getAttribute('data-group-name') || '';
        if (!targetGroup || targetGroup === dragState.groupName) {
          dragState.groupName = null;
          clearDragStyles();
          return;
        }

        const direction = getGroupDropDirection(e, targetCard);
        const insertAfter = direction === 'right' || direction === 'bottom';
        const moved = moveGroup(dragState.groupName, targetGroup, insertAfter);
        if (!moved && insertAfter) {
          moveGroupToEnd(dragState.groupName);
        }
        dragState.groupName = null;
        clearDragStyles();
      }
    });

    dom.linksList.addEventListener('dragend', () => {
      dragState.linkId = null;
      dragState.groupName = null;
      clearDragStyles();
    });

    dom.linksList.addEventListener('dblclick', (e) => {
      if (e.target.closest('.group-actions')) return;

      const title = e.target.closest('.group-title');
      if (!title) return;

      const oldName = title.getAttribute('data-group-name') || title.textContent || '';
      const input = document.createElement('input');
      input.type = 'text';
      input.value = oldName;
      input.style.width = '100%';
      input.style.marginBottom = '8px';

      title.replaceWith(input);
      input.focus();
      input.select();

      const commit = () => renameGroup(oldName, input.value);
      input.addEventListener('keydown', (ev) => {
        if (ev.key === 'Enter') commit();
        if (ev.key === 'Escape') renderLinks();
      });
      input.addEventListener('blur', commit, { once: true });
    });

    async function initApp() {
      updateDataFileLabel();
      const autoLoaded = await tryAutoLoadDefaultJson();
      if (!autoLoaded) {
        const cacheLoaded = loadFromCacheSnapshot();
        if (cacheLoaded) {
          setStatus('LinkData konnte nicht direkt gelesen werden. Letzte lokale Daten wurden geladen.');
          return;
        }

        const migrated = loadLegacyLocalData();
        if (migrated) {
          uiState.hasUnsavedChanges = true;
          writeCacheSnapshot();
          updateDataFileLabel();
          setStatus('Alte lokale Daten gefunden. Bitte in eine JSON-Datei speichern.');
        } else {
          setStatus('Bereit. JSON-Datei öffnen oder neue Daten anlegen.');
        }
        renderLinks();
      }
    }

    window.setInterval(updateClockWidgets, 1000);
    void initApp();
    window.addEventListener('resize', () => {
      closeContextMenu();
      closeWidgetAddMenu();
      fitViewport();
      requestAnimationFrame(() => {
        applyBoardMasonryLayout();
        updateClockWidgets();
      });
    });
  </script>
</body>
</html>
